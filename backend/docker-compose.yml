version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: emerald_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: voltshare_secure_pass_123
      POSTGRES_DB: emerald_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emerald_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emerald_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: super_secret_jwt_key_change_me_in_production
      JWT_EXPIRES_IN: 24h
      DB_USER: postgres
      DB_PASSWORD: voltshare_secure_pass_123
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: emerald_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
